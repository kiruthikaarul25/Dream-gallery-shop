<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packages — Dream Gallery Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Raleway',sans-serif;background:#080808;color:#fff;min-height:100vh;display:flex}

        .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#0a0a0a;border-right:1px solid rgba(212,175,55,0.1);display:flex;flex-direction:column;z-index:500;transition:transform 0.3s}
        .sidebar-brand{padding:26px 20px 22px;border-bottom:1px solid rgba(212,175,55,0.1);margin-bottom:16px}
        .sidebar-brand h2{font-family:'Cinzel',serif;font-size:1rem;font-weight:400;letter-spacing:3px;color:#D4AF37}
        .sidebar-brand p{font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:#333;margin-top:3px}
        .sidebar-nav{flex:1;padding:0 8px}
        .nav-section{padding:14px 12px 6px;font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:#333}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:2px;border-radius:10px;text-decoration:none;color:#444;font-size:0.75rem;letter-spacing:1.5px;text-transform:uppercase;border:1px solid transparent;transition:all 0.25s}
        .nav-item i{font-size:1rem;flex-shrink:0}
        .nav-item:hover,.nav-item.active{color:#D4AF37;background:rgba(212,175,55,0.07);border-color:rgba(212,175,55,0.12)}
        .sidebar-footer{padding:16px 8px;border-top:1px solid rgba(212,175,55,0.1)}
        .logout-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:#555;text-decoration:none;font-size:0.75rem;letter-spacing:1.5px;text-transform:uppercase;border:1px solid transparent;transition:all 0.25s}
        .logout-btn:hover{color:#e74c3c;background:rgba(231,76,60,0.06);border-color:rgba(231,76,60,0.12)}

        .hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:#0a0a0a;border:1px solid rgba(212,175,55,0.2);border-radius:8px;color:#D4AF37;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:399}
        .sidebar-overlay.open{display:block}

        @media(max-width:768px){
            .sidebar{transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .main{margin-left:0!important;padding:72px 14px 40px}
        }

        .main{margin-left:220px;flex:1;padding:36px 28px;min-height:100vh}
        .page-top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:28px;flex-wrap:wrap}
        .page-top h4{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:300;letter-spacing:3px;color:#fff}
        .page-top h4 span{color:#D4AF37}

        .form-card{background:#0e0e0e;border:1px solid rgba(212,175,55,0.15);border-radius:20px;padding:28px;max-width:580px;position:relative;overflow:hidden;margin-bottom:36px}
        .form-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(to right,transparent,#D4AF37,transparent)}
        .form-card-label{font-size:0.65rem;letter-spacing:4px;text-transform:uppercase;color:#D4AF37;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .form-card-label i{font-size:0.85rem}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
        @media(max-width:500px){.form-row{grid-template-columns:1fr}}
        .field input,.field textarea{width:100%;background:#080808;border:1px solid rgba(212,175,55,0.12);border-radius:12px;padding:12px 14px 12px 40px;color:#fff;font-family:'Raleway',sans-serif;font-size:0.85rem;font-weight:300;outline:none;transition:border-color 0.3s}
        .field input::placeholder,.field textarea::placeholder{color:#252525}
        .field input:focus,.field textarea:focus{border-color:rgba(212,175,55,0.45)}
        .field{position:relative}
        .field i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#333;font-size:0.95rem;pointer-events:none;transition:color 0.3s}
        .field.top-icon i{top:13px;transform:none}
        .field:focus-within i{color:#D4AF37}
        .field textarea{padding-top:11px;resize:vertical;min-height:76px}
        .price-sym{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#D4AF37;font-family:'Cinzel',serif;font-size:0.95rem;pointer-events:none;z-index:1}
        .price-input{padding-left:28px!important}
        .btn-add{margin-top:14px;padding:11px 28px;background:transparent;border:1px solid rgba(212,175,55,0.4);color:#D4AF37;border-radius:40px;cursor:pointer;font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;display:inline-flex;align-items:center;gap:7px;transition:all 0.3s}
        .btn-add:hover{background:#D4AF37;color:#000;border-color:#D4AF37}
        .btn-add i{font-size:0.95rem}

        .pkg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
        .pkg-card{background:#0e0e0e;border:1px solid rgba(212,175,55,0.12);border-radius:18px;padding:24px 22px;position:relative;overflow:hidden;transition:border-color 0.3s,transform 0.3s}
        .pkg-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(to right,transparent,rgba(212,175,55,0.3),transparent);opacity:0;transition:opacity 0.3s}
        .pkg-card:hover{border-color:rgba(212,175,55,0.35);transform:translateY(-3px)}
        .pkg-card:hover::before{opacity:1}
        .pkg-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
        .pkg-name{font-family:'Cinzel',serif;font-size:1rem;font-weight:400;color:#D4AF37;letter-spacing:2px}
        .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:30px;font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase}
        .badge-active{background:rgba(76,175,80,0.08);color:#4caf50;border:1px solid rgba(76,175,80,0.2)}
        .badge-inactive{background:rgba(231,76,60,0.08);color:#e74c3c;border:1px solid rgba(231,76,60,0.2)}
        .badge i{font-size:0.65rem}
        .pkg-desc{font-size:0.8rem;color:#444;font-weight:300;line-height:1.6;margin-bottom:14px;min-height:40px}
        .pkg-price{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:400;color:#fff;margin-bottom:18px}
        .pkg-actions{display:flex;gap:10px}
        .btn-edit{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:30px;border:1px solid rgba(212,175,55,0.2);color:#555;text-decoration:none;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;transition:all 0.25s}
        .btn-edit:hover{color:#D4AF37;border-color:rgba(212,175,55,0.5)}
        .btn-edit i{font-size:0.85rem}
        .btn-del{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:30px;border:1px solid rgba(231,76,60,0.15);color:#3a3a3a;background:none;cursor:pointer;font-family:'Raleway',sans-serif;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;transition:all 0.25s}
        .btn-del:hover{color:#e74c3c;border-color:rgba(231,76,60,0.4)}
        .btn-del i{font-size:0.85rem}

        .empty-state{text-align:center;padding:70px 20px}
        .empty-state i{font-size:2.5rem;color:rgba(212,175,55,0.15);margin-bottom:14px;display:block}
        .empty-state p{font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:2px;color:#2a2a2a}

        /* ── MOBILE TOP BAR ── */
        .mobile-topbar {
            display: none;
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 400;
            height: 56px;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            align-items: center;
            padding: 0 14px;
            gap: 12px;
        }
        .mobile-topbar-btn {
            background: transparent;
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 8px;
            color: #D4AF37;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
        }
        .mobile-topbar-title {
            font-family: 'Cinzel', serif;
            font-size: 0.88rem; letter-spacing: 2px; color: #D4AF37;
        }
        .mobile-topbar-title span { color: #fff; }
        @media(max-width:768px) { .mobile-topbar { display: flex; } }
    </style>
<link rel="stylesheet" href="/css/site-nav.css">
</head>
<body>
<!-- MOBILE TOP BAR -->
<div class="mobile-topbar">
    <button class="mobile-topbar-btn" id="mobMenuBtn" onclick="toggleSidebar()">
        <i class="ti ti-menu-2" id="mobMenuIcon"></i>
    </button>
    <span class="mobile-topbar-title">Our <span>Packages</span></span>
</div>


<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><h2>Dream Gallery</h2><p>Admin Panel</p></div>
    <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a th:href="@{/dashboard}" class="nav-item"><i class="ti ti-layout-dashboard"></i>Dashboard</a>
        <a th:href="@{/clients}" class="nav-item"><i class="ti ti-users"></i>Clients</a>
        <div class="nav-section">Business</div>
        <a th:href="@{/owner/packages}" class="nav-item active"><i class="ti ti-diamond"></i>Packages</a>
  
        <a th:href="@{/owner/profile}" class="nav-item"><i class="ti ti-user-circle"></i>Profile</a>
    </nav>
    <div class="sidebar-footer">
        <a th:href="@{/logout}" class="logout-btn"><i class="ti ti-logout"></i>Logout</a>
    </div>
</aside>

<div class="main">
    <div class="page-top">
        <h4>Our <span>Packages</span></h4>
    </div>

    <div class="form-card">
        <p class="form-card-label"><i class="ti ti-plus"></i>Add New Package</p>
        <form th:action="@{/owner/packages/create}" method="post">
            <div class="form-row">
                <div class="field">
                    <input type="text" name="name" placeholder="Package Name *" required>
                    <i class="ti ti-diamond"></i>
                </div>
                <div class="field" style="position:relative">
                    <span class="price-sym">₹</span>
                    <input type="number" name="price" placeholder="Price *" step="0.01" required class="price-input"
                        style="width:100%;background:#080808;border:1px solid rgba(212,175,55,0.12);border-radius:12px;padding:12px 14px 12px 28px;color:#fff;font-family:'Raleway',sans-serif;font-size:0.85rem;font-weight:300;outline:none;transition:border-color 0.3s"
                        onfocus="this.style.borderColor='rgba(212,175,55,0.45)'"
                        onblur="this.style.borderColor='rgba(212,175,55,0.12)'">
                </div>
            </div>
            <div class="field top-icon" style="margin-bottom:0">
                <textarea name="description" placeholder="Description (optional)"></textarea>
                <i class="ti ti-notes"></i>
            </div>
            <button type="submit" class="btn-add"><i class="ti ti-plus"></i>Add Package</button>
        </form>
    </div>

    <div class="pkg-grid" th:if="${packages != null and !#lists.isEmpty(packages)}">
        <div class="pkg-card" th:each="pkg : ${packages}">
            <div class="pkg-top">
                <span class="pkg-name" th:text="${pkg.name}">Package</span>
                <span class="badge badge-active" th:if="${pkg.isActive}"><i class="ti ti-circle-check"></i>Active</span>
                <span class="badge badge-inactive" th:unless="${pkg.isActive}"><i class="ti ti-circle-x"></i>Inactive</span>
            </div>
            <p class="pkg-desc" th:text="${pkg.description}">Description</p>
            <div class="pkg-price" th:text="'₹' + ${pkg.price}">₹0</div>
            <div class="pkg-actions">
                <a th:href="@{/owner/packages/{id}/edit(id=${pkg.id})}" class="btn-edit"><i class="ti ti-pencil"></i>Edit</a>
                <form th:action="@{/owner/packages/{id}/delete(id=${pkg.id})}" method="post"
                      onsubmit="return confirm('Delete this package?')">
                    <button type="submit" class="btn-del"><i class="ti ti-trash"></i>Delete</button>
                </form>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${packages == null or #lists.isEmpty(packages)}">
        <i class="ti ti-diamond"></i>
        <p>No packages yet — add one above!</p>
    </div>
</div>

<script>
    
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const icon = document.getElementById('mobMenuIcon');
        const isOpen = sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
        if (icon) icon.className = isOpen ? 'ti ti-x' : 'ti ti-menu-2';
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) toggleSidebar();
        }
    });
</script>

<nav class="bottom-nav">
    <ul>
        <li><a href="/"><i class="ti ti-home"></i><span>Home</span></a></li>
        <li><a href="/work"><i class="ti ti-video"></i><span>Work</span></a></li>
        <li><a href="/select"><i class="ti ti-photo"></i><span>Select</span></a></li>
        <li><a href="/packages-page"><i class="ti ti-diamond"></i><span>Packages</span></a></li>
        <li><a href="/contact"><i class="ti ti-phone"></i><span>Contact</span></a></li>
    </ul>
</nav>

<script src="/js/constants.js"></script>
</body>
</html>
