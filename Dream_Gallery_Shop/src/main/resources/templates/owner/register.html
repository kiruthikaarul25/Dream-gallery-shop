<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Dream Gallery Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Raleway',sans-serif;background:#080808;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
        body::before{content:'';position:fixed;inset:0;background:url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=1200&auto=format&fit=crop') center/cover no-repeat;opacity:0.04;pointer-events:none}

        .wrap{width:100%;max-width:420px;position:relative;z-index:1}

        /* BRAND */
        .brand{text-align:center;margin-bottom:32px}
        .brand-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
        .brand-dots span{width:5px;height:5px;border-radius:50%;background:rgba(212,175,55,0.3)}
        .brand-dots span:nth-child(2){background:#D4AF37}
        .brand h1{font-family:'Cinzel',serif;font-size:clamp(1.4rem,4vw,1.8rem);font-weight:300;color:#fff;letter-spacing:6px}
        .brand h1 span{color:#D4AF37}
        .brand p{font-size:0.68rem;letter-spacing:5px;text-transform:uppercase;color:#333;margin-top:6px}

        /* CARD */
        .card{background:#0e0e0e;border:1px solid rgba(212,175,55,0.18);border-radius:22px;padding:36px 32px;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(to right,transparent,#D4AF37,transparent)}
        @media(max-width:480px){.card{padding:28px 20px}}

        .card-eyebrow{font-size:0.65rem;letter-spacing:4px;text-transform:uppercase;color:#D4AF37;margin-bottom:8px}
        .card h2{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:300;color:#fff;letter-spacing:3px;margin-bottom:6px}
        .gold-line{width:40px;height:1px;background:linear-gradient(to right,transparent,#D4AF37,transparent);margin-bottom:26px}

        /* ERROR */
        .alert-error{display:flex;align-items:center;gap:10px;background:rgba(231,76,60,0.07);border:1px solid rgba(231,76,60,0.25);border-radius:12px;padding:12px 16px;color:#e74c3c;font-size:0.8rem;margin-bottom:22px}
        .alert-error i{font-size:1.05rem;flex-shrink:0}

        /* SECTION SEP */
        .section-sep{display:flex;align-items:center;gap:10px;margin:20px 0 16px}
        .section-sep .sep-line{flex:1;height:1px;background:rgba(212,175,55,0.08)}
        .section-sep .sep-label{font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:#2a2a2a;white-space:nowrap}

        /* FIELDS */
        .field{margin-bottom:16px}
        .field label{display:block;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:7px}
        .input-wrap{position:relative}
        .input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#333;font-size:1rem;pointer-events:none;transition:color 0.3s}
        .input-wrap:focus-within i{color:#D4AF37}
        .field input{width:100%;background:#080808;border:1px solid rgba(212,175,55,0.12);border-radius:12px;padding:12px 16px 12px 42px;color:#fff;font-family:'Raleway',sans-serif;font-size:0.86rem;font-weight:300;outline:none;transition:border-color 0.3s}
        .field input::placeholder{color:#252525}
        .field input:focus{border-color:rgba(212,175,55,0.45)}

        /* SUBMIT */
        .btn-register{width:100%;margin-top:10px;padding:14px;background:transparent;border:1px solid rgba(212,175,55,0.45);color:#D4AF37;border-radius:40px;cursor:pointer;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.35s}
        .btn-register:hover{background:#D4AF37;color:#000;border-color:#D4AF37}
        .btn-register i{font-size:1rem}

        /* LOGIN LINK */
        .login-link{text-align:center;margin-top:22px;font-size:0.78rem;color:#2a2a2a;letter-spacing:0.5px}
        .login-link a{color:#D4AF37;text-decoration:none;border-bottom:1px solid rgba(212,175,55,0.3);transition:border-color 0.3s;padding-bottom:1px}
        .login-link a:hover{border-color:#D4AF37}
    </style>
<link rel="stylesheet" href="/css/site-nav.css">
</head>
<body>

<div class="wrap">

    <div class="brand">
        <div class="brand-dots"><span></span><span></span><span></span></div>
        <h1>Dream <span>Gallery</span></h1>
        <p>Photography Admin Portal</p>
    </div>

    <div class="card">
        <p class="card-eyebrow">New Account</p>
        <h2>Create Account</h2>
        <div class="gold-line"></div>

        <div class="alert-error" th:if="${error}">
            <i class="ti ti-alert-circle"></i>
            <span th:text="${error}">Error message</span>
        </div>

        <form th:action="@{/register}" th:object="${owner}" method="post">

            <!-- PERSONAL -->
            <div class="section-sep">
                <div class="sep-line"></div>
                <div class="sep-label">Personal</div>
                <div class="sep-line"></div>
            </div>

            <div class="field">
                <label>Full Name</label>
                <div class="input-wrap">
                    <input type="text" th:field="*{name}" placeholder="Arjun Sharma" required>
                    <i class="ti ti-user"></i>
                </div>
            </div>

            <div class="field">
                <label>Studio Name</label>
                <div class="input-wrap">
                    <input type="text" th:field="*{studioName}" placeholder="Arjun Captures">
                    <i class="ti ti-camera"></i>
                </div>
            </div>

            <!-- CREDENTIALS -->
            <div class="section-sep">
                <div class="sep-line"></div>
                <div class="sep-label">Credentials</div>
                <div class="sep-line"></div>
            </div>

            <div class="field">
                <label>Email</label>
                <div class="input-wrap">
                    <input type="email" th:field="*{email}" placeholder="your@email.com" required>
                    <i class="ti ti-mail"></i>
                </div>
            </div>

            <div class="field">
                <label>Phone</label>
                <div class="input-wrap">
                    <input type="text" th:field="*{phone}" placeholder="+91 98765 43210">
                    <i class="ti ti-phone"></i>
                </div>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" th:field="*{passwordHash}" placeholder="••••••••" required>
                    <i class="ti ti-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn-register">
                <i class="ti ti-user-plus"></i>Create Account
            </button>

        </form>
    </div>

    <p class="login-link">
        Already have an account? <a th:href="@{/login}">Login</a>
    </p>

</div>


<nav class="bottom-nav">
    <ul>
        <li><a href="/"><i class="ti ti-home"></i><span>Home</span></a></li>
        <li><a href="/work"><i class="ti ti-video"></i><span>Work</span></a></li>
        <li><a href="/select"><i class="ti ti-photo"></i><span>Select</span></a></li>
        <li><a href="/packages-page"><i class="ti ti-diamond"></i><span>Packages</span></a></li>
        <li><a href="/contact"><i class="ti ti-phone"></i><span>Contact</span></a></li>
    </ul>
</nav>

<script src="/js/constants.js"></script>
</body>
</html>
