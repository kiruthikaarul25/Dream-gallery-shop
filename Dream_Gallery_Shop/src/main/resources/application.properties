# ===================================
# APP NAME
# ===================================
spring.application.name=Dream_Gallery_Shop

# ===================================
# SERVER PORT
# Railway PORT env variable use பண்ணும்
# Local-ல் 8765 use பண்ணும்
# ===================================
server.port=${PORT:8765}

# ===================================
# DATABASE - MySQL
# Railway-ல் env variable use பண்ணும்
# Local-ல் உங்க localhost use பண்ணும்
# ===================================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/dream_gallery_shop?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:nk3125}
# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# THYMELEAF
# ===================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ===================================
# FILE UPLOAD
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB

# ===================================
# UPLOAD DIRECTORY
# Railway-ல் /tmp use பண்ணும் (ephemeral)
# Local-ல் uploads/photos use பண்ணும்
# ===================================
app.upload.dir=${UPLOAD_DIR:uploads/photos}

# ===================================
# STATIC RESOURCES
# ===================================
spring.web.resources.static-locations=classpath:/static/,file:./