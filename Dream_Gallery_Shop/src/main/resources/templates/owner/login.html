<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Dream Gallery Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Raleway',sans-serif;background:#080808;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
        body::before{content:'';position:fixed;inset:0;background:url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=1200&auto=format&fit=crop') center/cover no-repeat;opacity:0.04;pointer-events:none}

        .wrap{width:100%;max-width:400px;position:relative;z-index:1}

        /* BRAND */
        .brand{text-align:center;margin-bottom:36px}
        .brand-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
        .brand-dots span{width:5px;height:5px;border-radius:50%;background:rgba(212,175,55,0.3)}
        .brand-dots span:nth-child(2){background:#D4AF37}
        .brand h1{font-family:'Cinzel',serif;font-size:clamp(1.5rem,5vw,1.9rem);font-weight:300;color:#fff;letter-spacing:6px}
        .brand h1 span{color:#D4AF37}
        .brand p{font-size:0.68rem;letter-spacing:5px;text-transform:uppercase;color:#333;margin-top:6px}

        /* CARD */
        .card{background:#0e0e0e;border:1px solid rgba(212,175,55,0.18);border-radius:22px;padding:40px 36px;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(to right,transparent,#D4AF37,transparent)}
        @media(max-width:480px){.card{padding:30px 22px}}

        .card-eyebrow{font-size:0.65rem;letter-spacing:4px;text-transform:uppercase;color:#D4AF37;margin-bottom:8px}
        .card h2{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:300;color:#fff;letter-spacing:3px;margin-bottom:24px}
        .gold-line{width:40px;height:1px;background:linear-gradient(to right,transparent,#D4AF37,transparent);margin-bottom:28px}

        /* ALERTS */
        .alert{display:flex;align-items:center;gap:10px;border-radius:12px;padding:12px 16px;font-size:0.8rem;margin-bottom:22px;line-height:1.5}
        .alert i{font-size:1.05rem;flex-shrink:0}
        .alert-error{background:rgba(231,76,60,0.07);border:1px solid rgba(231,76,60,0.25);color:#e74c3c}
        .alert-success{background:rgba(76,175,80,0.07);border:1px solid rgba(76,175,80,0.25);color:#4caf50}

        /* FIELDS */
        .field{margin-bottom:18px}
        .field label{display:block;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:8px}
        .input-wrap{position:relative}
        .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#333;font-size:1rem;pointer-events:none;transition:color 0.3s}
        .input-wrap:focus-within i{color:#D4AF37}
        .field input{width:100%;background:#080808;border:1px solid rgba(212,175,55,0.12);border-radius:12px;padding:13px 16px 13px 42px;color:#fff;font-family:'Raleway',sans-serif;font-size:0.88rem;font-weight:300;outline:none;transition:border-color 0.3s}
        .field input::placeholder{color:#252525}
        .field input:focus{border-color:rgba(212,175,55,0.45)}

        /* SUBMIT */
        .btn-login{width:100%;margin-top:10px;padding:14px;background:transparent;border:1px solid rgba(212,175,55,0.45);color:#D4AF37;border-radius:40px;cursor:pointer;font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.35s}
        .btn-login:hover{background:#D4AF37;color:#000;border-color:#D4AF37}
        .btn-login i{font-size:1rem}

        /* BACK */
        .back-link{text-align:center;margin-top:24px}
        .back-link a{color:#2a2a2a;text-decoration:none;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px;transition:color 0.3s}
        .back-link a:hover{color:#D4AF37}
        .back-link a i{font-size:0.9rem}
    </style>
</head>
<body>

<div class="wrap">

    <div class="brand">
        <div class="brand-dots"><span></span><span></span><span></span></div>
        <h1>Dream <span>Gallery</span></h1>
        <p>Wedding Photography Portal</p>
    </div>

    <div class="card">
        <p class="card-eyebrow">Admin Portal</p>
        <h2>Welcome Back</h2>
        <div class="gold-line"></div>

        <!-- Error -->
        <div class="alert alert-error" th:if="${error}">
            <i class="ti ti-alert-circle"></i>
            <span th:text="${error}">Invalid credentials.</span>
        </div>

        <!-- Success -->
        <div class="alert alert-success" th:if="${msg}">
            <i class="ti ti-circle-check"></i>
            <span th:text="${msg}">Success.</span>
        </div>

        <form th:action="@{/login}" method="post">

            <div class="field">
                <label>Email</label>
                <div class="input-wrap">
                    <input type="email" name="email" placeholder="your@email.com" required>
                    <i class="ti ti-mail"></i>
                </div>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" name="password" placeholder="••••••••" required>
                    <i class="ti ti-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="ti ti-login"></i>Login
            </button>

        </form>
    </div>

    <div class="back-link">
        <a href="/select"><i class="ti ti-arrow-left"></i>Client Login</a>
    </div>

</div>

</body>
</html>
