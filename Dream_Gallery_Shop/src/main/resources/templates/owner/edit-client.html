<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Client — Dream Gallery Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --gold: #c9a84c; --gold-light: #e2c97e; --gold-dim: rgba(201,168,76,0.12);
            --gold-border: rgba(201,168,76,0.25); --bg: #080808; --surface: #0e0e0e;
            --surface2: #141414; --surface3: #1c1c1c; --border: rgba(201,168,76,0.2);
            --text: #e8e0d0; --text-muted: #6a6050; --red: #c0392b;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Raleway', sans-serif; min-height: 100vh; display: flex; }

        .sidebar {
            width: 240px; min-height: 100vh; background: var(--surface);
            border-right: 1px solid var(--border); padding: 28px 16px;
            position: fixed; top: 0; left: 0; display: flex; flex-direction: column;
            z-index: 200; transition: transform 0.3s ease;
        }
        .sidebar-brand {
            font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
            color: var(--gold); letter-spacing: 0.12em; padding: 0 8px 28px;
            border-bottom: 1px solid var(--border); margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar a {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            border-radius: 8px; color: var(--text-muted); text-decoration: none;
            font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
            margin-bottom: 2px; transition: all 0.2s;
        }
        .sidebar a:hover { background: var(--gold-dim); color: var(--gold); }
        .sidebar a.active { background: var(--gold-dim); color: var(--gold); border-left: 2px solid var(--gold); }
        .sidebar a i { font-size: 16px; width: 20px; }
        .sidebar-logout { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
        .sidebar-logout a { color: var(--red) !important; }
        .sidebar-logout a:hover { background: rgba(192,57,43,0.1) !important; }

        .hamburger {
            display: none; position: fixed; top: 16px; left: 16px; z-index: 300;
            background: var(--surface); border: 1px solid var(--border); color: var(--gold);
            width: 40px; height: 40px; border-radius: 8px; align-items: center;
            justify-content: center; cursor: pointer; font-size: 20px;
        }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; }
        .sidebar-overlay.open { display: block; }

        .main { margin-left: 240px; flex: 1; padding: 40px 36px; min-height: 100vh; }
        .page-top { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
        .btn-back {
            display: flex; align-items: center; gap: 6px; padding: 8px 16px;
            border-radius: 20px; border: 1px solid var(--border); background: transparent;
            color: var(--text-muted); font-family: 'Raleway', sans-serif;
            font-size: 13px; text-decoration: none; transition: all 0.2s;
        }
        .btn-back:hover { border-color: var(--gold); color: var(--gold); }
        .page-title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 600; color: var(--gold-light); letter-spacing: 0.06em; }

        .form-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 32px; max-width: 540px; position: relative; overflow: hidden;
        }
        .form-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        .field { margin-bottom: 20px; }
        .field label {
            display: block; font-size: 11px; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; font-weight: 600;
        }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 16px; pointer-events: none; transition: color 0.2s;
        }
        .input-wrap:focus-within i { color: var(--gold); }
        .field input, .field select, .field textarea {
            width: 100%; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 14px 12px 42px; color: var(--text);
            font-family: 'Raleway', sans-serif; font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        .field input::placeholder, .field textarea::placeholder { color: var(--text-muted); }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
        .field select { appearance: none; cursor: pointer; }
        .field select option { background: var(--surface2); }
        .field textarea { resize: vertical; min-height: 80px; padding-top: 12px; }

        .section-label {
            display: flex; align-items: center; gap: 10px; margin: 24px 0 18px;
            font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold);
        }
        .section-label::before, .section-label::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .btn-save {
            width: 100%; margin-top: 8px; padding: 14px; background: transparent;
            border: 1px solid var(--gold); color: var(--gold); border-radius: 40px;
            cursor: pointer; font-family: 'Cinzel', serif; font-size: 12px;
            letter-spacing: 0.12em; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.3s;
        }
        .btn-save:hover { background: var(--gold); color: #000; }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding: 72px 16px 40px; }
            .form-card { padding: 24px 18px; }
        }
    </style>
<link rel="stylesheet" href="/css/site-nav.css">
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="ti ti-camera"></i> DREAM GALLERY</div>
    <a th:href="@{/dashboard}"><i class="ti ti-home"></i> Dashboard</a>
    <a th:href="@{/clients}" class="active"><i class="ti ti-users"></i> Clients</a>
    <a th:href="@{/owner/packages}"><i class="ti ti-package"></i> Packages</a>
    <a th:href="@{/owner/profile}"><i class="ti ti-user"></i> Profile</a>
    <div class="sidebar-logout">
        <a th:href="@{/logout}"><i class="ti ti-logout"></i> Logout</a>
    </div>
</div>

<div class="main">
    <div class="page-top">
        <a th:href="@{/clients/{id}(id=${client.id})}" class="btn-back"><i class="ti ti-arrow-left"></i> Back</a>
        <h1 class="page-title">Edit Client</h1>
    </div>

    <div class="form-card">
        <form th:action="@{/clients/{id}/edit(id=${client.id})}" method="post">

            <div class="section-label"><i class="ti ti-heart"></i> Couple Details</div>

            <div class="field">
                <label>Couple Name</label>
                <div class="input-wrap">
                    <i class="ti ti-heart"></i>
                    <input type="text" name="coupleName" th:value="${client.coupleName}" placeholder="e.g. Rahul & Priya" required>
                </div>
            </div>

            <div class="field">
                <label>Email</label>
                <div class="input-wrap">
                    <i class="ti ti-mail"></i>
                    <input type="email" name="email" th:value="${client.email}" placeholder="email@example.com">
                </div>
            </div>

            <div class="field">
                <label>Phone</label>
                <div class="input-wrap">
                    <i class="ti ti-phone"></i>
                    <input type="text" name="phone" th:value="${client.phone}" placeholder="+91 98765 43210">
                </div>
            </div>

            <div class="field">
                <label>Wedding Date</label>
                <div class="input-wrap">
                    <i class="ti ti-calendar"></i>
                    <input type="date" name="weddingDate" th:value="${client.weddingDate}">
                </div>
            </div>

            <div class="section-label"><i class="ti ti-settings"></i> Account Settings</div>

            <div class="field">
                <label>Status</label>
                <div class="input-wrap">
                    <i class="ti ti-circle-check"></i>
                    <select name="status">
                        <option value="active"    th:selected="${client.status == 'active'}">Active</option>
                        <option value="pending"   th:selected="${client.status == 'pending'}">Pending</option>
                        <option value="selecting" th:selected="${client.status == 'selecting'}">Selecting</option>
                        <option value="paid"      th:selected="${client.status == 'paid'}">Paid</option>
                        <option value="done"      th:selected="${client.status == 'done'}">Done</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label>Username (leave blank to keep)</label>
                <div class="input-wrap">
                    <i class="ti ti-key"></i>
                    <input type="text" name="accessToken" placeholder="Leave blank to keep current">
                </div>
            </div>

            <div class="field">
                <label>Password (leave blank to keep)</label>
                <div class="input-wrap">
                    <i class="ti ti-lock"></i>
                    <input type="text" name="accessPassword" placeholder="Leave blank to keep current">
                </div>
            </div>

            <button type="submit" class="btn-save">
                <i class="ti ti-device-floppy"></i> Save Changes
            </button>
        </form>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }
</script>

<nav class="bottom-nav">
    <ul>
        <li><a href="/"><i class="ti ti-home"></i><span>Home</span></a></li>
        <li><a href="/work"><i class="ti ti-video"></i><span>Work</span></a></li>
        <li><a href="/select"><i class="ti ti-photo"></i><span>Select</span></a></li>
        <li><a href="/packages-page"><i class="ti ti-diamond"></i><span>Packages</span></a></li>
        <li><a href="/contact"><i class="ti ti-phone"></i><span>Contact</span></a></li>
    </ul>
</nav>

<script src="/js/constants.js"></script>
</body>
</html>
