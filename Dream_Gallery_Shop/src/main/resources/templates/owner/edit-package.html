<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Package — Dream Gallery Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Raleway',sans-serif;background:#080808;color:#fff;min-height:100vh;display:flex}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#0a0a0a;border-right:1px solid rgba(212,175,55,0.1);display:flex;flex-direction:column;z-index:100;transition:transform 0.3s}
        .sidebar-brand{padding:26px 20px 22px;border-bottom:1px solid rgba(212,175,55,0.1);margin-bottom:16px}
        .sidebar-brand h2{font-family:'Cinzel',serif;font-size:1rem;font-weight:400;letter-spacing:3px;color:#D4AF37}
        .sidebar-brand p{font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:#333;margin-top:3px}
        .sidebar-nav{flex:1;padding:0 8px}
        .nav-section{padding:14px 12px 6px;font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:#333}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:2px;border-radius:10px;text-decoration:none;color:#444;font-size:0.75rem;letter-spacing:1.5px;text-transform:uppercase;border:1px solid transparent;transition:all 0.25s}
        .nav-item i{font-size:1rem;flex-shrink:0}
        .nav-item:hover,.nav-item.active{color:#D4AF37;background:rgba(212,175,55,0.07);border-color:rgba(212,175,55,0.12)}
        .sidebar-footer{padding:16px 8px;border-top:1px solid rgba(212,175,55,0.1)}
        .logout-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:#555;text-decoration:none;font-size:0.75rem;letter-spacing:1.5px;text-transform:uppercase;border:1px solid transparent;transition:all 0.25s}
        .logout-btn:hover{color:#e74c3c;background:rgba(231,76,60,0.06);border-color:rgba(231,76,60,0.12)}

        .hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:#0a0a0a;border:1px solid rgba(212,175,55,0.2);border-radius:8px;color:#D4AF37;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:99}
        .sidebar-overlay.open{display:block}

        @media(max-width:768px){
            .hamburger{display:flex}
            .sidebar{transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .main{margin-left:0!important;padding:72px 14px 40px}
            .form-card{padding:24px 18px}
        }

        .main{margin-left:220px;flex:1;padding:36px 28px;min-height:100vh}
        .page-top{display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap}
        .back-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:30px;border:1px solid rgba(212,175,55,0.2);color:#555;text-decoration:none;font-size:0.72rem;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.25s}
        .back-btn:hover{color:#D4AF37;border-color:rgba(212,175,55,0.4)}
        .back-btn i{font-size:0.9rem}
        .page-top h4{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:300;letter-spacing:3px;color:#fff}
        .page-top h4 span{color:#D4AF37}

        .form-card{background:#0e0e0e;border:1px solid rgba(212,175,55,0.15);border-radius:20px;padding:36px 32px;max-width:500px;position:relative;overflow:hidden}
        .form-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(to right,transparent,#D4AF37,transparent)}

        .field{margin-bottom:20px}
        .field label{display:block;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:8px}
        .input-wrap{position:relative}
        .input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#333;font-size:1rem;pointer-events:none;transition:color 0.3s}
        .input-wrap.top-icon i{top:14px;transform:none}
        .input-wrap:focus-within i{color:#D4AF37}
        .field input,.field textarea{width:100%;background:#080808;border:1px solid rgba(212,175,55,0.12);border-radius:12px;padding:13px 16px 13px 42px;color:#fff;font-family:'Raleway',sans-serif;font-size:0.88rem;font-weight:300;outline:none;transition:border-color 0.3s}
        .field input::placeholder,.field textarea::placeholder{color:#2a2a2a}
        .field input:focus,.field textarea:focus{border-color:rgba(212,175,55,0.45)}
        .field textarea{resize:vertical;min-height:90px;padding-top:12px}

        .toggle-wrap{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#080808;border:1px solid rgba(212,175,55,0.12);border-radius:12px}
        .toggle-label{font-size:0.85rem;color:#888;font-weight:300;flex:1}
        .toggle{position:relative;width:44px;height:24px;flex-shrink:0}
        .toggle input{opacity:0;width:0;height:0}
        .toggle-slider{position:absolute;inset:0;background:#1a1a1a;border:1px solid rgba(212,175,55,0.2);border-radius:24px;cursor:pointer;transition:all 0.3s}
        .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#444;border-radius:50%;transition:all 0.3s}
        .toggle input:checked + .toggle-slider{background:rgba(212,175,55,0.15);border-color:rgba(212,175,55,0.5)}
        .toggle input:checked + .toggle-slider::before{transform:translateX(20px);background:#D4AF37}

        .section-sep{display:flex;align-items:center;gap:12px;margin:24px 0 20px}
        .section-sep .sep-line{flex:1;height:1px;background:rgba(212,175,55,0.08)}
        .section-sep .sep-label{display:flex;align-items:center;gap:7px;font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:#D4AF37;white-space:nowrap}
        .section-sep .sep-label i{font-size:0.85rem}

        .btn-save{width:100%;margin-top:8px;padding:14px;background:transparent;border:1px solid rgba(212,175,55,0.45);color:#D4AF37;border-radius:40px;cursor:pointer;font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.35s}
        .btn-save:hover{background:#D4AF37;color:#000;border-color:#D4AF37}
        .btn-save i{font-size:1rem}

        /* price ₹ symbol */
        .price-wrap{position:relative}
        .price-sym{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#D4AF37;font-family:'Cinzel',serif;font-size:0.95rem;pointer-events:none;z-index:1}
        .price-wrap input{padding-left:30px!important}
    </style>
<link rel="stylesheet" href="/css/site-nav.css">
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><h2>Dream Gallery</h2><p>Admin Panel</p></div>
    <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a th:href="@{/dashboard}" class="nav-item"><i class="ti ti-layout-dashboard"></i>Dashboard</a>
        <a th:href="@{/clients}" class="nav-item"><i class="ti ti-users"></i>Clients</a>
        <div class="nav-section">Business</div>
        <a th:href="@{/owner/packages}" class="nav-item active"><i class="ti ti-diamond"></i>Packages</a>
        <a th:href="@{/owner/orders}" class="nav-item"><i class="ti ti-receipt"></i>Orders</a>
        <a th:href="@{/owner/profile}" class="nav-item"><i class="ti ti-user-circle"></i>Profile</a>
    </nav>
    <div class="sidebar-footer">
        <a th:href="@{/logout}" class="logout-btn"><i class="ti ti-logout"></i>Logout</a>
    </div>
</aside>

<div class="main">
    <div class="page-top">
        <a th:href="@{/owner/packages}" class="back-btn"><i class="ti ti-arrow-left"></i>Back</a>
        <h4>Edit <span>Package</span></h4>
    </div>

    <div class="form-card">
        <form th:action="@{/owner/packages/{id}/edit(id=${pkg.id})}" method="post">

            <div class="section-sep">
                <div class="sep-line"></div>
                <div class="sep-label"><i class="ti ti-diamond"></i>Package Details</div>
                <div class="sep-line"></div>
            </div>

            <div class="field">
                <label>Package Name</label>
                <div class="input-wrap">
                    <input type="text" name="name" th:value="${pkg.name}" placeholder="e.g. Silver Package" required>
                    <i class="ti ti-diamond"></i>
                </div>
            </div>

            <div class="field">
                <label>Price</label>
                <div class="input-wrap price-wrap">
                    <span class="price-sym">₹</span>
                    <input type="number" name="price" th:value="${pkg.price}" placeholder="25000" step="0.01" required>
                </div>
            </div>

            <div class="field">
                <label>Description</label>
                <div class="input-wrap top-icon">
                    <textarea name="description" placeholder="Describe what's included in this package..." th:text="${pkg.description}"></textarea>
                    <i class="ti ti-notes"></i>
                </div>
            </div>

            <div class="section-sep">
                <div class="sep-line"></div>
                <div class="sep-label"><i class="ti ti-settings"></i>Settings</div>
                <div class="sep-line"></div>
            </div>

            <div class="field">
                <div class="toggle-wrap">
                    <span class="toggle-label">Active — visible to clients</span>
                    <label class="toggle">
                        <input type="checkbox" name="isActive" value="true" th:checked="${pkg.isActive}">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-save">
                <i class="ti ti-device-floppy"></i>Save Changes
            </button>
        </form>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }
</script>

<nav class="bottom-nav">
    <ul>
        <li><a href="/"><i class="ti ti-home"></i><span>Home</span></a></li>
        <li><a href="/work"><i class="ti ti-video"></i><span>Work</span></a></li>
        <li><a href="/select"><i class="ti ti-photo"></i><span>Select</span></a></li>
        <li><a href="/packages-page"><i class="ti ti-diamond"></i><span>Packages</span></a></li>
        <li><a href="/contact"><i class="ti ti-phone"></i><span>Contact</span></a></li>
    </ul>
</nav>

<script src="/js/constants.js"></script>
</body>
</html>
