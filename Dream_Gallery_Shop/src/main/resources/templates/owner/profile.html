<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Dream Gallery Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Raleway',sans-serif;background:#080808;color:#fff;min-height:100vh;display:flex}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#0a0a0a;border-right:1px solid rgba(212,175,55,0.1);display:flex;flex-direction:column;z-index:500;transition:transform 0.3s}
        .sidebar-brand{padding:26px 20px 22px;border-bottom:1px solid rgba(212,175,55,0.1);margin-bottom:16px}
        .sidebar-brand h2{font-family:'Cinzel',serif;font-size:1rem;font-weight:400;letter-spacing:3px;color:#D4AF37}
        .sidebar-brand p{font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:#333;margin-top:3px}
        .sidebar-nav{flex:1;padding:0 8px}
        .nav-section{padding:14px 12px 6px;font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:#333}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:2px;border-radius:10px;text-decoration:none;color:#444;font-size:0.75rem;letter-spacing:1.5px;text-transform:uppercase;border:1px solid transparent;transition:all 0.25s}
        .nav-item i{font-size:1rem;flex-shrink:0}
        .nav-item:hover,.nav-item.active{color:#D4AF37;background:rgba(212,175,55,0.07);border-color:rgba(212,175,55,0.12)}
        .sidebar-footer{padding:16px 8px;border-top:1px solid rgba(212,175,55,0.1)}
        .logout-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:#555;text-decoration:none;font-size:0.75rem;letter-spacing:1.5px;text-transform:uppercase;border:1px solid transparent;transition:all 0.25s}
        .logout-btn:hover{color:#e74c3c;background:rgba(231,76,60,0.06);border-color:rgba(231,76,60,0.12)}

        .hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:#0a0a0a;border:1px solid rgba(212,175,55,0.2);border-radius:8px;color:#D4AF37;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:399}
        .sidebar-overlay.open{display:block}

        @media(max-width:768px){
            .sidebar{transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .main{margin-left:0!important;padding:72px 14px 40px}
            .form-card{padding:24px 18px}
        }

        .main{margin-left:220px;flex:1;padding:36px 28px;min-height:100vh}
        .page-top{display:flex;align-items:center;gap:14px;margin-bottom:28px}
        .page-top h4{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:300;letter-spacing:3px;color:#fff}
        .page-top h4 span{color:#D4AF37}

        .form-card{background:#0e0e0e;border:1px solid rgba(212,175,55,0.15);border-radius:20px;padding:36px 32px;max-width:500px;position:relative;overflow:hidden}
        .form-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(to right,transparent,#D4AF37,transparent)}

        .avatar-wrap{display:flex;align-items:center;gap:18px;margin-bottom:30px;padding-bottom:24px;border-bottom:1px solid rgba(212,175,55,0.08)}
        .avatar{width:68px;height:68px;border-radius:50%;background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.3);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:1.6rem;font-weight:400;color:#D4AF37;flex-shrink:0}
        .avatar-info h3{font-family:'Cinzel',serif;font-size:0.9rem;font-weight:400;letter-spacing:2px;color:#fff;margin-bottom:4px}
        .avatar-info p{font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;color:#333}

        .section-sep{display:flex;align-items:center;gap:12px;margin:22px 0 18px}
        .section-sep .sep-line{flex:1;height:1px;background:rgba(212,175,55,0.08)}
        .section-sep .sep-label{display:flex;align-items:center;gap:7px;font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:#D4AF37;white-space:nowrap}
        .section-sep .sep-label i{font-size:0.85rem}
        .field{margin-bottom:18px}
        .field label{display:block;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:8px}
        .input-wrap{position:relative}
        .input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#333;font-size:1rem;pointer-events:none;transition:color 0.3s}
        .input-wrap:focus-within i{color:#D4AF37}
        .field input{width:100%;background:#080808;border:1px solid rgba(212,175,55,0.12);border-radius:12px;padding:13px 16px 13px 42px;color:#fff;font-family:'Raleway',sans-serif;font-size:0.88rem;font-weight:300;outline:none;transition:border-color 0.3s}
        .field input::placeholder{color:#252525}
        .field input:focus{border-color:rgba(212,175,55,0.45)}
        .field input[readonly]{color:#333;cursor:not-allowed;border-color:rgba(255,255,255,0.04)}
        .field input[readonly]:focus{border-color:rgba(255,255,255,0.04)}
        .readonly-hint{font-size:0.65rem;color:#2a2a2a;margin-top:5px;letter-spacing:0.5px}

        .btn-save{width:100%;margin-top:8px;padding:14px;background:transparent;border:1px solid rgba(212,175,55,0.45);color:#D4AF37;border-radius:40px;cursor:pointer;font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.35s}
        .btn-save:hover{background:#D4AF37;color:#000;border-color:#D4AF37}
        .btn-save i{font-size:1rem}

        /* ── MOBILE TOP BAR ── */
        .mobile-topbar {
            display: none;
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 400;
            height: 56px;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            align-items: center;
            padding: 0 14px;
            gap: 12px;
        }
        .mobile-topbar-btn {
            background: transparent;
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 8px;
            color: #D4AF37;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
        }
        .mobile-topbar-title {
            font-family: 'Cinzel', serif;
            font-size: 0.88rem; letter-spacing: 2px; color: #D4AF37;
        }
        .mobile-topbar-title span { color: #fff; }
        @media(max-width:768px) { .mobile-topbar { display: flex; } }
    </style>
</head>
<body>
<!-- MOBILE TOP BAR -->
<div class="mobile-topbar">
    <button class="mobile-topbar-btn" id="mobMenuBtn" onclick="toggleSidebar()">
        <i class="ti ti-menu-2" id="mobMenuIcon"></i>
    </button>
    <span class="mobile-topbar-title">My <span>Profile</span></span>
</div>


<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><h2>Dream Gallery</h2><p>Admin Panel</p></div>
    <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a th:href="@{/dashboard}" class="nav-item"><i class="ti ti-layout-dashboard"></i>Dashboard</a>
        <a th:href="@{/clients}" class="nav-item"><i class="ti ti-users"></i>Clients</a>
        <div class="nav-section">Business</div>
        <a th:href="@{/owner/packages}" class="nav-item"><i class="ti ti-diamond"></i>Packages</a>

        <a th:href="@{/owner/profile}" class="nav-item active"><i class="ti ti-user-circle"></i>Profile</a>
    </nav>
    <div class="sidebar-footer">
        <a th:href="@{/logout}" class="logout-btn"><i class="ti ti-logout"></i>Logout</a>
    </div>
</aside>

<div class="main">
    <div class="page-top">
        <h4>My <span>Profile</span></h4>
    </div>

    <div class="form-card">
        <div class="avatar-wrap">
            <div class="avatar" th:text="${#strings.substring(owner.name, 0, 1)}">A</div>
            <div class="avatar-info">
                <h3 th:text="${owner.name}">Owner Name</h3>
                <p th:text="${owner.studioName != null} ? ${owner.studioName} : 'Dream Gallery Photography'">Studio Name</p>
            </div>
        </div>

        <form th:action="@{/owner/profile}" th:object="${owner}" method="post">
            <div class="section-sep">
                <div class="sep-line"></div>
                <div class="sep-label"><i class="ti ti-user"></i>Personal Info</div>
                <div class="sep-line"></div>
            </div>
            <div class="field">
                <label>Full Name</label>
                <div class="input-wrap">
                    <input type="text" th:field="*{name}" placeholder="Your full name" required>
                    <i class="ti ti-user"></i>
                </div>
            </div>
            <div class="field">
                <label>Studio Name</label>
                <div class="input-wrap">
                    <input type="text" th:field="*{studioName}" placeholder="Dream Gallery Photography">
                    <i class="ti ti-camera"></i>
                </div>
            </div>
            <div class="section-sep">
                <div class="sep-line"></div>
                <div class="sep-label"><i class="ti ti-address-book"></i>Contact</div>
                <div class="sep-line"></div>
            </div>
            <div class="field">
                <label>Email</label>
                <div class="input-wrap">
                    <input type="email" th:field="*{email}" readonly>
                    <i class="ti ti-mail"></i>
                </div>
                <div class="readonly-hint">Email cannot be changed</div>
            </div>
            <div class="field">
                <label>Phone</label>
                <div class="input-wrap">
                    <input type="text" th:field="*{phone}" placeholder="+91 98765 43210">
                    <i class="ti ti-phone"></i>
                </div>
            </div>
            <button type="submit" class="btn-save">
                <i class="ti ti-device-floppy"></i>Save Changes
            </button>
        </form>
    </div>
</div>

<script>
    
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const icon = document.getElementById('mobMenuIcon');
        const isOpen = sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
        if (icon) icon.className = isOpen ? 'ti ti-x' : 'ti ti-menu-2';
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) toggleSidebar();
        }
    });
</script>
</body>
</html>
